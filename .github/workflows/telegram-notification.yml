name: Telegram article notification

on:
  workflow_dispatch:
    inputs:
      article_file:
        description: "Путь к статье, например content/articles/example.md"
        required: true
        type: string

      send_to_telegram:
        description: "Отправить уведомление в Telegram"
        required: true
        default: false
        type: boolean

  push:
    branches:
      - main
    paths:
      - "content/articles/**/*.md"
      - "content/articles/*.md"

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Download repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Find and read article
        id: article
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_ARTICLE_FILE: ${{ inputs.article_file }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ARTICLE_FILE="$MANUAL_ARTICLE_FILE"
            echo "Ручная проверка файла: $ARTICLE_FILE"

            if [ ! -f "$ARTICLE_FILE" ]; then
              echo "Файл не найден: $ARTICLE_FILE"
              exit 1
            fi
          else
            ARTICLE_FILE=$(git diff \
              --diff-filter=A \
              --name-only \
              "$PUSH_BEFORE" \
              "$PUSH_AFTER" \
              | grep -E '^content/articles/.*\.md$' \
              | head -n 1 || true)
          fi

          if [ -z "${ARTICLE_FILE:-}" ]; then
            echo "Новая статья не найдена."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Найдена статья: $ARTICLE_FILE"

          FRONT_MATTER=$(sed -n '/^---$/,/^---$/p' "$ARTICLE_FILE")

          TITLE=$(printf '%s\n' "$FRONT_MATTER" \
            | sed -n 's/^title:[[:space:]]*"\(.*\)"$/\1/p' \
            | head -n 1)

          SUMMARY=$(printf '%s\n' "$FRONT_MATTER" \
            | sed -n 's/^summary:[[:space:]]*"\(.*\)"$/\1/p' \
            | head -n 1)

          SLUG=$(printf '%s\n' "$FRONT_MATTER" \
            | sed -n 's/^slug:[[:space:]]*"\(.*\)"$/\1/p' \
            | head -n 1)

          DRAFT=$(printf '%s\n' "$FRONT_MATTER" \
            | sed -n 's/^draft:[[:space:]]*\(.*\)$/\1/p' \
            | head -n 1 \
            | tr -d '[:space:]')

          if [ "$DRAFT" != "false" ]; then
            echo "Статья является черновиком или поле draft заполнено некорректно."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$TITLE" ]; then
            echo "В статье отсутствует поле title."
            exit 1
          fi

          if [ -z "$SUMMARY" ]; then
            echo "В статье отсутствует поле summary."
            exit 1
          fi

          if [ -z "$SLUG" ]; then
            echo "В статье отсутствует поле slug."
            exit 1
          fi

          ARTICLE_URL="https://gbak.space/articles/${SLUG}/"

          {
            echo "found=true"
            echo "file=$ARTICLE_FILE"
            echo "url=$ARTICLE_URL"

            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"

            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Telegram message
        if: steps.article.outputs.found == 'true'
        id: message
        shell: bash
        env:
          ARTICLE_TITLE: ${{ steps.article.outputs.title }}
          ARTICLE_SUMMARY: ${{ steps.article.outputs.summary }}
          ARTICLE_URL: ${{ steps.article.outputs.url }}
        run: |
          set -euo pipefail

          escape_html() {
            printf '%s' "$1" \
              | sed \
                  -e 's/&/\&amp;/g' \
                  -e 's/</\&lt;/g' \
                  -e 's/>/\&gt;/g'
          }

          SAFE_TITLE=$(escape_html "$ARTICLE_TITLE")
          SAFE_SUMMARY=$(escape_html "$ARTICLE_SUMMARY")

          {
            echo "text<<EOF"
            echo "🆕 <b>Новая статья на GBAK</b>"
            echo
            echo "<b>${SAFE_TITLE}</b>"
            echo
            echo "${SAFE_SUMMARY}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Подготовлено уведомление:"
          echo
          echo "Новая статья на GBAK"
          echo
          echo "$ARTICLE_TITLE"
          echo
          echo "$ARTICLE_SUMMARY"
          echo
          echo "Кнопка: Читать статью"
          echo "Ссылка: $ARTICLE_URL"

      - name: Wait for article availability
        if: >
          steps.article.outputs.found == 'true' &&
          (
            github.event_name == 'push' ||
            inputs.send_to_telegram == true
          )
        shell: bash
        env:
          ARTICLE_URL: ${{ steps.article.outputs.url }}
        run: |
          set -euo pipefail

          MAX_ATTEMPTS=60
          WAIT_SECONDS=60

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            HTTP_STATUS=$(curl \
              --silent \
              --location \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 30 \
              "$ARTICLE_URL" || true)

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Статья доступна. Получен HTTP 200."
              echo "Попытка: $ATTEMPT из $MAX_ATTEMPTS."
              exit 0
            fi

            echo "Статья пока недоступна."
            echo "HTTP-статус: ${HTTP_STATUS:-нет ответа}."
            echo "Попытка: $ATTEMPT из $MAX_ATTEMPTS."

            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              echo "Следующая проверка через 1 минуту."
              sleep "$WAIT_SECONDS"
            fi
          done

          echo "Статья не стала доступна в течение 60 минут."
          exit 1

      - name: Send notification to Telegram
        if: >
          steps.article.outputs.found == 'true' &&
          (
            github.event_name == 'push' ||
            inputs.send_to_telegram == true
          )
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MESSAGE_TEXT: ${{ steps.message.outputs.text }}
          ARTICLE_URL: ${{ steps.article.outputs.url }}
        run: |
          set -euo pipefail

          BUTTON_JSON=$(printf \
            '{"inline_keyboard":[[{"text":"📖 Читать статью","url":"%s"}]]}' \
            "$ARTICLE_URL")

          RESPONSE=$(curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHANNEL_ID}" \
            --data-urlencode "text=${MESSAGE_TEXT}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "reply_markup=${BUTTON_JSON}" \
            --data-urlencode "disable_web_page_preview=true")

          echo "Telegram принял уведомление."
